<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DB Manager</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        .cred-list { margin-bottom: 2em; }
        .table-list, .table-data { margin-top: 2em; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 0.5em; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h1>Database Manager</h1>
    <form hx-post="/add-credential" hx-target="#cred-list" hx-swap="outerHTML">
        <label>Type:
            <select name="type">
                <option value="sqlite">SQLite</option>
                <option value="postgres">Postgres</option>
                <option value="mysql">MySQL</option>
            </select>
        </label>
        <label>Host: <input name="host" placeholder="localhost"></label>
        <label>Port: <input name="port" placeholder="5432"></label>
        <label>User: <input name="user"></label>
        <label>Password: <input name="password" type="password"></label>
        <label>Database/File: <input name="database"></label>
        <button type="submit">Save Credential</button>
    </form>
    <div id="cred-list" class="cred-list">
        {% include 'partials/credentials.html' %}
    </div>
    <div id="db-tables" class="table-list"></div>
    <div id="table-data" class="table-data"></div>
    <script>
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            console.log('[HTMX] Request:', evt.detail.requestConfig);
        });
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            console.log('[HTMX] Response:', evt.detail.xhr.status, evt.detail.xhr.responseText.slice(0, 200));
        });
        document.body.addEventListener('htmx:responseError', function(evt) {
            console.error('[HTMX] Response Error:', evt.detail.xhr.status, evt.detail.xhr.responseText);
        });
        document.body.addEventListener('htmx:sendError', function(evt) {
            console.error('[HTMX] Send Error:', evt.detail);
        });
        document.body.addEventListener('htmx:targetError', function(evt) {
            console.error('[HTMX] Target Error:', evt.detail);
        });
    </script>
</body>
</html>
