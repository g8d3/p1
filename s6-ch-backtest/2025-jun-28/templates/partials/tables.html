{% if tables %}
<h2>Tables</h2>
<form hx-post="/create-table" hx-target="#db-tables" hx-swap="outerHTML">
    <input type="hidden" name="idx" value="{{ idx }}">
    <input name="table" placeholder="Table name">
    <input name="columns" placeholder="e.g. id INTEGER PRIMARY KEY, name TEXT">
    <button type="submit">Create Table</button>
</form>
<ul>
    {% for table in tables %}
    <li>
        <button hx-post="/table-data" hx-vals='{"idx": "{{ idx }}", "table": "{{ table }}"}' hx-target="#table-data" hx-swap="innerHTML">{{ table }}</button>
        <form hx-post="/drop-table" hx-target="#db-tables" hx-swap="outerHTML" style="display:inline">
            <input type="hidden" name="idx" value="{{ idx }}">
            <input type="hidden" name="table" value="{{ table }}">
            <button type="submit">Drop</button>
        </form>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No tables found.</p>
{% endif %}
